name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: customer_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r pipeline-service/requirements.txt
          pip install -r mock-server/requirements.txt

      - name: Run unit tests
        run: |
          cd pipeline-service
          python -m pytest tests/test_unit/ -v --tb=short

      - name: Run integration tests
        run: |
          cd pipeline-service
          DATABASE_URL="postgresql://postgres:password@localhost:5432/customer_db" \
          python -m pytest tests/test_integration/ -v --tb=short

      - name: Run E2E tests
        run: |
          cd pipeline-service
          python -m pytest tests/test_e2e/ -v --tb=short
