[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --strict-markers
    --tb=short
markers =
    e2e: End-to-end tests (require full docker stack)
    unit: Unit tests (no external dependencies)
    integration: Integration tests (require database)
asyncio_mode = auto
